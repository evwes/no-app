name: Probe EFAST attachment endpoints
on:
  push:
    branches: ["claude/wampo-401k-live-nx1t4o", "main"]
    paths: ["scripts/probe-attachments.mjs", ".github/workflows/probe.yml"]
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/probe-attachments.mjs
